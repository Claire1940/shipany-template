<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.5" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" rx="56" fill="url(#bg)"/>
  <circle cx="970" cy="190" r="210" fill="#34d399" opacity="0.15" filter="url(#glow)"/>
  <circle cx="210" cy="635" r="220" fill="#22d3ee" opacity="0.14" filter="url(#glow)"/>
  <rect x="76" y="70" width="1048" height="660" rx="44" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.16)"/>
  <text x="120" y="160" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#ffffff">OneAIHub</text>
  <text x="120" y="272" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="900" fill="#ffffff">Creator Monthly</text>
  <rect x="120" y="324" width="390" height="72" rx="36" fill="url(#accent)"/>
  <text x="160" y="372" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#05201d">150 AI Credits</text>
  <text x="120" y="482" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700" fill="#ccfbf1">Every month</text>
  <text x="120" y="548" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#a7f3d0">For creators using AI daily</text>
  <text x="120" y="650" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff">$9.99 / month</text>
  <text x="1015" y="650" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#99f6e4">TEST MODE</text>
</svg>
