name: Build and Push Docker Image

# Keep this workflow registered for automatic main branch Docker image builds.
on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: claire1940/shipany-template
  SVR_NAME: ${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=https://www.oneaihub.online
            NEXT_PUBLIC_APP_NAME=OneAIHub
            NEXT_PUBLIC_APP_DESCRIPTION=An all-in-one AI platform for chat, image generation, music generation, and creative AI tools.
            NEXT_PUBLIC_DEFAULT_LOCALE=en
            NEXT_PUBLIC_LOCALE_DETECT_ENABLED=false
            NEXT_PUBLIC_THEME=trustai
            NEXT_PUBLIC_APPEARANCE=dark
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
